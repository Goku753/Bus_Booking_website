<!DOCTYPE html>

<html>
<head>
    <title>User Login</title>

<style>
    body{
        font-family: Arial, sans-serif;
        background:#eaf4ff;
        display:flex;
        justify-content:center;
        align-items:center;
        height:100vh;
    }

    .card{
        background:white;
        padding:30px;
        width:400px;
        border-radius:10px;
        box-shadow:0 0 10px #ccc;
    }

    h2{
        text-align:center;
        color:#007bff;
    }

    input{
        width:100%;
        padding:10px;
        margin:10px 0;
        border:1px solid #ccc;
        border-radius:5px;
    }

    button{
        width:100%;
        padding:12px;
        background:#007bff;
        color:white;
        border:none;
        border-radius:5px;
        cursor:pointer;
    }

    button:hover{
        background:#0056b3;
    }

    a{
        text-decoration:none;
        color:#007bff;
    }

    p{
        text-align:center;
    }
</style>


</head>

<body>

<div class="card">


<h2>🔐 User Login</h2>

<form method="POST">

    <input type="email"
           name="email"
           placeholder="Enter Email"
           required>

    <input type="password"
           name="password"
           placeholder="Enter Password"
           required>

    <button type="submit">
        Login
    </button>

</form>

<p>
    Don't have an account?
    <a href="/signup">Signup</a>
</p>


</div>

</body>
</html>
