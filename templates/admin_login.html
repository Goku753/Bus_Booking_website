<!DOCTYPE html>
<html>
<head>
    <title>Admin Login</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:linear-gradient(to right,#74b9ff,#0984e3);
        }

        .login-box{
            width:400px;
            background:white;
            padding:40px;
            border-radius:15px;
            box-shadow:0 10px 25px rgba(0,0,0,0.2);
        }

        .login-box h2{
            text-align:center;
            margin-bottom:25px;
            color:#2d3436;
        }

        label{
            font-weight:bold;
            color:#2d3436;
        }

        input{
            width:100%;
            padding:12px;
            margin-top:8px;
            margin-bottom:20px;
            border:1px solid #ccc;
            border-radius:8px;
            font-size:15px;
        }

        button{
            width:100%;
            padding:12px;
            background:#0984e3;
            color:white;
            border:none;
            border-radius:8px;
            font-size:16px;
            cursor:pointer;
            font-weight:bold;
        }

        button:hover{
            background:#0768b5;
        }

        .home-btn{
            display:block;
            text-align:center;
            margin-top:15px;
            text-decoration:none;
            color:#0984e3;
            font-weight:bold;
        }

        .home-btn:hover{
            text-decoration:underline;
        }
    </style>
</head>
<body>

    <div class="login-box">
        <h2>🔐 Admin Login</h2>

        <form method="POST">

            <label>Username</label>
            <input type="text"
                   name="username"
                   placeholder="Enter Username"
                   required>

            <label>Password</label>
            <input type="password"
                   name="password"
                   placeholder="Enter Password"
                   required>

            <button type="submit">
                Login
            </button>

        </form>

        <a href="/" class="home-btn">
            🏠 Back to Home
        </a>

    </div>

</body>
</html>
