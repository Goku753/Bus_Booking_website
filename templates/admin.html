<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Bus Booking</title>


<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
    body{
        background:#f4f6f9;
    }

    .navbar{
        background:#0d6efd;
    }

    .navbar-brand{
        color:white !important;
        font-size:24px;
        font-weight:bold;
    }

    .card{
        border:none;
        border-radius:15px;
        box-shadow:0px 4px 15px rgba(0,0,0,0.1);
    }

    .dashboard-link{
        text-decoration:none;
    }

    .dashboard-card{
        border-radius:15px;
        color:white;
        text-align:center;
        padding:25px;
        font-size:22px;
        font-weight:bold;
        transition:0.3s;
        cursor:pointer;
    }

    .dashboard-card:hover{
        transform:translateY(-5px);
        box-shadow:0px 8px 20px rgba(0,0,0,0.2);
    }

    .card-1{
        background:#0d6efd;
    }

    .card-2{
        background:#198754;
    }

    .card-3{
        background:#ffc107;
        color:black;
    }

    .section-title{
        text-align:center;
        margin-bottom:30px;
    }

    .btn-custom{
        min-width:180px;
    }
</style>


</head>
<body>

<nav class="navbar navbar-expand-lg">
    <div class="container">

    <span class="navbar-brand">
        🚌 Bus Booking Admin Panel
    </span>

    <div>

        <a href="/search" class="btn btn-light me-2">
            🏠 Home
        </a>

        <a href="/admin/logout" class="btn btn-danger">
            🚪 Admin Logout
        </a>

    </div>

</div>


</nav>

<div class="container mt-5">


<!-- DASHBOARD CARDS -->
<div class="row mb-4">

    <div class="col-md-4 mb-3">
        <a href="/admin" class="dashboard-link">
            <div class="dashboard-card card-1">
                🚌 Add New Buses
            </div>
        </a>
    </div>

    <div class="col-md-4 mb-3">
        <a href="/admin/routes" class="dashboard-link">
            <div class="dashboard-card card-2">
                🛣️ Manage Routes
            </div>
        </a>
    </div>

    <div class="col-md-4 mb-3">
        <a href="/admin/bookings" class="dashboard-link">
            <div class="dashboard-card card-3">
                📋 Manage Bookings
            </div>
        </a>
    </div>

</div>

<!-- ADD BUS FORM -->
<div class="card p-4">

    <h1 class="section-title">
        ➕ Add New Bus
    </h1>

    <form method="POST">

        <div class="row">

            <div class="col-md-6 mb-3">
                <label class="form-label">
                    Bus Name
                </label>

                <input
                    type="text"
                    name="bus_name"
                    class="form-control"
                    required>
            </div>

            <div class="col-md-6 mb-3">
                <label class="form-label">
                    Departure Time
                </label>

                <input
                    type="text"
                    name="time"
                    class="form-control"
                    placeholder="e.g. 6:00 AM"
                    required>
            </div>

        </div>

        <div class="row">

            <div class="col-md-6 mb-3">
                <label class="form-label">
                    Start City
                </label>

                <input
                    type="text"
                    name="from_city"
                    class="form-control"
                    required>
            </div>

            <div class="col-md-6 mb-3">
                <label class="form-label">
                    End City
                </label>

                <input
                    type="text"
                    name="to_city"
                    class="form-control"
                    required>
            </div>

        </div>

        <div class="mb-3">
            <label class="form-label">
                Total Seats
            </label>

            <input
                type="number"
                name="seats"
                class="form-control"
                required>
        </div>

        <div class="mb-3">
            <label class="form-label">
                Stops (comma separated)
            </label>

            <textarea
                name="stops"
                rows="4"
                class="form-control"
                placeholder="KHARAGPUR, BELDA, KATHI"
                required></textarea>

            <small class="text-muted">
                Include all intermediate stops.
            </small>
        </div>

        <button
            type="submit"
            class="btn btn-primary w-100">

            ➕ Add Bus

        </button>

    </form>

</div>

<!-- BOTTOM BUTTONS -->
<div class="text-center mt-4">

    <a
        href="/admin/bookings"
        class="btn btn-success btn-custom me-2">

        📋 View Bookings

    </a>

    <a
        href="/admin/routes"
        class="btn btn-warning btn-custom me-2">

        🛣️ Manage Routes

    </a>

    <a
        href="/admin/export-bookings"
        class="btn btn-info btn-custom me-2">

        📥 Export CSV

    </a>

    <a
        href="/search"
        class="btn btn-secondary btn-custom">

        🏠 Back Home

    </a>

</div>


</div>

</body>
</html>
