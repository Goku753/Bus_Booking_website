<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Booking Successful</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background:#f4f6f9;
        }

        .success-card{
            max-width:600px;
            margin:auto;
            margin-top:80px;
            border:none;
            border-radius:20px;
            box-shadow:0px 5px 20px rgba(0,0,0,0.15);
        }

        .success-icon{
            font-size:70px;
        }
    </style>
</head>
<body>

<div class="container">

    <div class="card success-card p-5 text-center">

        <div class="success-icon">
            ✅
        </div>

        <h1 class="text-success mt-3">
            Booking Successful!
        </h1>

        <hr>

        <h4 class="mb-3">
            Passenger Details
        </h4>

        <p>
            <strong>Name:</strong>
            {{ name }}
        </p>

        <p>
            <strong>Bus Name:</strong>
            {{ bus_name }}
        </p>

        <p>
            <strong>Seat Number:</strong>
            {{ seat_no }}
        </p>

        <p>
            <strong>From:</strong>
            {{ from_city }}
        </p>

        <p>
            <strong>To:</strong>
            {{ to_city }}
        </p>

        <p>
            <strong>Travel Date:</strong>
            {{ travel_date }}
        </p>

        <div class="mt-4">

            <a href="/" class="btn btn-primary me-2">
                🏠 Home
            </a>

            <a href="/my-bookings" class="btn btn-success">
                🎫 My Bookings
            </a>

        </div>

    </div>

</div>

</body>
</html>
