<!DOCTYPE html>
<html>
<head>
    <title>Book Seat - {{ bus.bus_name }}</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 30px;
        }

        .container {
            max-width: 500px;
            margin: auto;
            border: 1px solid #ccc;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px #ddd;
        }

        h2 {
            text-align: center;
            color: #003366;
        }

        label {
            font-weight: bold;
        }

        input,
        select {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            margin-bottom: 15px;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 10px;
            background-color: #ffcc00;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover {
            background-color: #ff9900;
        }

        .readonly {
            background-color: #f5f5f5;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>🚌 Book Seat - {{ bus.bus_name }}</h2>

        <form method="POST">

            <label>Your Name:</label>
            <input type="text" name="name" required>

            <label>Select Seat:</label>
            <select name="seat_no" required>
                {% for i in range(1, bus.seats + 1) %}
                    {% if i not in booked %}
                        <option value="{{ i }}">
                            Seat {{ i }}
                        </option>
                    {% endif %}
                {% endfor %}
            </select>

            <label>From:</label>
            <input
                type="text"
                name="from_city"
                value="{{ bus.from_city }}"
                readonly
                class="readonly"
            >

            <label>To:</label>
            <input
                type="text"
                name="to_city"
                value="{{ bus.to_city }}"
                readonly
                class="readonly"
            >

            <label>Travel Date:</label>
            <input
                type="text"
                name="travel_date"
                value="{{ travel_date }}"
                readonly
                class="readonly"
            >

            <button type="submit">
                Confirm Booking
            </button>

        </form>

        <br>

        <a href="{{ url_for('search') }}">
            ← Back to Search
        </a>
    </div>

</body>
</html>
